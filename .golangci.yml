version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "check-doc-comments"

issues:
  max-same-issues: 0
