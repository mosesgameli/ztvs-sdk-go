name: Bug Report
about: Create a report to help us improve the ZTVS Go SDK
title: '[BUG] '
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Repro Steps
      description: How can we reproduce this?
      placeholder: |
        1. Step 1
        2. Step 2
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Go version, OS, etc.
      placeholder: |
        Go: 1.25.1
        OS: macOS/Linux
    validations:
      required: true
